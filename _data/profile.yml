research_summary: >
  My research goal is to build robots that learn long-horizon manipulation skills
  and operate reliably in unstructured real-world environments. I focus on
  imitation learning and vision-language-action (VLA) models for robotic
  manipulation, with hands-on experience deploying multimodal policies on physical
  robots and validating their robustness through closed-loop real-robot trials.
  I am currently extending this work toward reward and value learning from
  foundation models to reduce demonstration dependence and improve generalization.

focus:
  - Imitation Learning
  - Vision-Language-Action Models
  - Real-Robot Manipulation
  - Closed-Loop Deployment
  - Foundation-Model Rewards
  - Embodied AI

research_highlights:
  - title: IL on real robots, not just simulation
    summary: Designed and validated MaskACT, an ACT-based behavior cloning policy with a binary visual mask prior, improving real-robot thinning success from 40% to 62% with 1 hour of teleoperated demonstrations.
  - title: End-to-end IL pipeline ownership
    summary: Built and operated the full stack from teleoperation rig, dataset curation, training, and closed-loop deployment.
  - title: Multi-platform manipulation experience
    summary: Deployed learned and classical policies on AI-Worker, Piper, xArm7, UR3/UR5, RB5-850e, and 4-Finger Gripper (SNU).
  - title: Active research trajectory
    summary: Extending single-arm VLA to bimanual setups, integrating GR00T-N1.5, and exploring foundation-model reward/value learning.

