<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/styles.css?v=20260529c' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <nav class="nav-shell" aria-label="Primary navigation">
        <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} home">
          <span class="brand-mark">CL</span>
          <span>{{ site.title }}</span>
        </a>
        <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false" data-nav-toggle>
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="nav-links" data-nav-links>
          <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}aria-current="page"{% endif %}>about</a>
          <a href="{{ '/cv/' | relative_url }}" {% if page.url contains '/cv/' %}aria-current="page"{% endif %}>cv</a>
          <a href="{{ '/publications/' | relative_url }}" {% if page.url contains '/publications/' %}aria-current="page"{% endif %}>publications</a>
          <a href="{{ '/projects/' | relative_url }}" {% if page.url contains '/projects/' %}aria-current="page"{% endif %}>projects</a>
          <a href="{{ '/blog/' | relative_url }}" {% if page.url contains '/blog/' %}aria-current="page"{% endif %}>blog</a>
        </div>
      </nav>
    </header>
    <main class="page-shell">
      {{ content }}
    </main>
    <footer class="site-footer">
      <span>&copy; {{ 'now' | date: '%Y' }} {{ site.title }}.</span>
      <span>Robotic learning portfolio.</span>
    </footer>
    <script src="{{ '/assets/js/site.js?v=20260529c' | relative_url }}"></script>
  </body>
</html>
