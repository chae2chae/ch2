---
layout: default
---
<article class="content-page">
  <header class="page-header">
    <p class="eyebrow">{{ page.kicker | default: 'Portfolio' }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p>{{ page.description }}</p>
    {% endif %}
  </header>
  {{ content }}
</article>
