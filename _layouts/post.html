---
layout: default
---
<article class="content-page post-detail">
  <header class="page-header">
    <p class="eyebrow">{{ page.date | date: '%B %d, %Y' }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p>{{ page.description }}</p>
    {% endif %}
  </header>
  <section class="prose">
    {{ content }}
  </section>
</article>
